<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      padding: 12px;
      width: 260px;
      background: #111;
      color: #fff;
    }

    h2 {
      margin-top: 0;
      font-size: 16px;
    }

    h3 {
      margin: 12px 0 6px;
      font-size: 13px;
      color: #aaa;
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 8px 0;
    }

    .switch {
      position: relative;
      width: 36px;
      height: 18px;
    }

    .switch input {
      display: none;
    }

    .slider {
      position: absolute;
      cursor: pointer;
      background: #555;
      border-radius: 18px;
      width: 100%;
      height: 100%;
      transition: 0.2s;
    }

    .slider:before {
      content: "";
      position: absolute;
      height: 14px;
      width: 14px;
      left: 2px;
      top: 2px;
      background: white;
      border-radius: 50%;
      transition: 0.2s;
    }

    input:checked + .slider {
      background: #4caf50;
    }

    input:checked + .slider:before {
      transform: translateX(18px);
    }
  </style>
</head>
<body>

  <h2>YouTube Settings</h2>

  <h3>Home</h3>
  <div class="row">Latest <label class="switch"><input type="checkbox" id="home-hideLatest"><span class="slider"></span></label></div>
  <div class="row">Shorts <label class="switch"><input type="checkbox" id="home-hideShorts"><span class="slider"></span></label></div>
  <div class="row">Live <label class="switch"><input type="checkbox" id="home-hideLive"><span class="slider"></span></label></div>

  <h3>Subscriptions</h3>
  <div class="row">Latest <label class="switch"><input type="checkbox" id="subs-hideLatest"><span class="slider"></span></label></div>
  <div class="row">Shorts <label class="switch"><input type="checkbox" id="subs-hideShorts"><span class="slider"></span></label></div>
  <div class="row">Live <label class="switch"><input type="checkbox" id="subs-hideLive"><span class="slider"></span></label></div>

  <script src="popup.js"></script>
</body>
</html>
